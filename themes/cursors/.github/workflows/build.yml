name: Build, cache, and publish cursors

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: |
            accept-flake-config = true
            extra-substituters = https://neonvoidx.cachix.org
            extra-trusted-public-keys = neonvoidx.cachix.org-1:nHFGhvzWqULuNWFbuPwTP0eUW+k7utl0chxXhUJhU1Y=

      - uses: cachix/cachix-action@v15
        with:
          name: neonvoidx
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build all cursor variants
        run: |
          nix build ".#default" --print-build-logs

      - name: Create per-variant zip archives
        run: |
          mkdir -p releases
          for theme in result/share/icons/eldritch-*-cursors; do
            name=$(basename "$theme")
            cd "$theme" && zip -ry "$OLDPWD/releases/$name" . && cd "$OLDPWD"
          done

      - name: Upload per-variant artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cursors
          path: releases/*.zip
          if-no-files-found: error

      - name: Determine next version
        id: version
        if: github.event_name != 'pull_request'
        run: |
          git fetch --tags --force
          latest_tag=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)
          if [ -z "$latest_tag" ]; then
            echo "version=v0.1.0" >> "$GITHUB_OUTPUT"
          else
            major=$(echo "$latest_tag" | cut -d. -f1 | tr -d v)
            minor=$(echo "$latest_tag" | cut -d. -f2)
            patch=$(echo "$latest_tag" | cut -d. -f3)
            echo "version=v$major.$minor.$((patch + 1))" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and upload GitHub Release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ steps.version.outputs.version }}"
          [[ "${{ github.event_name }}" == "release" ]] && TAG="${{ github.event.release.tag_name }}"

          gh release create "$TAG" --title "Release $TAG" --notes "Cursors built from \`master\`."

          for zip in releases/*.zip; do
            gh release upload "$TAG" "$zip" --clobber
          done
